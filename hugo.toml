baseURL = 'https://mignotus.github.io/'
languageCode = 'en-us'
title = 'mignotus'
theme = 'minimal-black'

[params]
  brand = "mignotus"

  # Favicon (place files in /static/)
  favicon = "favicon.svg"
  appleTouchIcon = "apple-touch-icon.png"

  # Theme Configuration
  [params.theme]
    defaultTheme = "system"  # "light", "dark", or "system"

  # Hero Section
  [params.hero]
    badge = "Software Engineer"
    title = "Hi, I'm mignotus."
    role = "Building minimal, fast web experiences."
    summary = "Using Hugo to create this website."
    avatar = "images/avatar.jpg"  # Optional
    location = "Rome, Italy"

    [params.hero.primary]
      label = "View projects"
      href = "/projects/"

    [params.hero.secondary]
      label = "Read the blog"
      href = "/blog/"
  
  [params.home]
    [[params.home.tech]]
        label = "Python"
        icon = "devicon-python-plain"

    [[params.home.tech]]
        label = "Docker"
        icon = "devicon-docker-plain"

  # Social Links
  [[params.social]]
    label = "GitHub"
    url = "https://github.com/mignotus"
    icon = "fa-brands fa-github"

  [[params.social]]
    label = "LinkedIn"
    url = "https://linkedin.com/in/mignotus"
    icon = "fa-brands fa-linkedin-in"

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2

  [[menu.main]]
    name = "Projects"
    url = "/projects/"
    weight = 3

  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 4

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

  [markup.goldmark.renderer]
    unsafe = true

  [markup.highlight]
    codeFences = true
    guessSyntax = true
    style = "monokai"

[caches]
  [caches.images]
    dir = ':cacheDir/images'
