baseURL = 'https://mignotus.github.io/'
languageCode = 'en-us'
title = 'mignotus'
theme = 'minimal-black'

[params]
  brand = "mignotus"

  # Favicon (place files in /static/)
  favicon = "favicon.svg"
  appleTouchIcon = "apple-touch-icon.png"

  # Theme Configuration
  [params.theme]
    defaultTheme = "system"  # "light", "dark", or "system"

  # Hero Section
  [params.hero]
    badge = "Software Engineer"
    title = "Hi, I'm mignotus."
    role = "Building minimal, fast web experiences."
    summary = "Using Hugo to create this website."
    avatar = "images/avatar.jpg"  # Optional
    location = "Rome, Italy"

    [params.hero.primary]
      label = "View projects"
      href = "/projects/"

    [params.hero.secondary]
      label = "Read the blog"
      href = "/blog/"

  # Home Page Configuration
  [params.home]
    sections = ["hero", "now", "tech-marquee", "projects", "posts"]
    showNowSection = true
    showFeaturedProjects = true
    showLatestPosts = true
    featuredProjectsLimit = 3
    latestPostsLimit = 3
    projectsTitle = "Selected Work"
    projectsSubtitle = ""
    blogTitle = "Latest Writing"
    blogSubtitle = ""
    techMarqueeLabel = "Experienced In"

    # Technology Stack Display
    [[params.home.tech]]
      label = "Python"
      icon = "devicon-python-plain"

    [[params.home.tech]]
      label = "Java"
      icon = "devicon-java-plain"

    [[params.home.tech]]
      label = "Spring"
      icon = "devicon-spring-plain"  

    [[params.home.tech]]
      label = "Vaadin"
      icon = "devicon-vaadin-plain"    

    [[params.home.tech]]
      label = "Debian"
      icon = "devicon-debian-plain"

    [[params.home.tech]]
      label = "GitLab"
      icon = "devicon-gitlab-plain"

    [[params.home.tech]]
      label = "Docker"
      icon = "devicon-docker-plain"

    [[params.home.techReverse]]
      label = "PostgreSQL"
      icon = "devicon-postgresql-plain"

    [[params.home.techReverse]]
      label = "MongoDB"
      icon = "devicon-mongodb-plain"

    [[params.home.techReverse]]
      label = "Git"
      icon = "devicon-git-plain"

    [[params.home.techReverse]]
      label = "Hugo"
      icon = "devicon-hugo-plain"  

    [[params.home.techReverse]]
      label = "Jenkins"
      icon = "devicon-jenkins-plain"   

    [[params.home.techReverse]]
      label = "JetBrains"
      icon = "devicon-jetbrains-plain" 

    [[params.home.techReverse]]
      label = "Json"
      icon = "devicon-json-plain" 

    [[params.home.techReverse]]
      label = "Linux"
      icon = "devicon-linux-plain"          

    [[params.home.techReverse]]
      label = "Liquibase"
      icon = "devicon-liquibase-plain" 

    [[params.home.techReverse]]
      label = "Markdown"
      icon = "devicon-markdown-original"  

    [[params.home.techReverse]]
      label = "YAML"
      icon = "devicon-yaml-plain"  

    [[params.home.techReverse]]
      label = "Wordpress"
      icon = "devicon-wordpress-plain"

    [[params.home.techReverse]]
      label = "WooCommerce"
      icon = "devicon-woocommerce-plain"            

    [[params.home.techReverse]]
      label = "Traefik"
      icon = "devicon-traefikproxy-plain" 

    [[params.home.techReverse]]
      label = "pfSense"
      icon = "devicon-pfsense-plain"  


  # Social Links
  [[params.social]]
    label = "GitHub"
    url = "https://github.com/mignotus"
    icon = "fa-brands fa-github"

  [[params.social]]
    label = "LinkedIn"
    url = "https://linkedin.com/in/mignotus"
    icon = "fa-brands fa-linkedin-in"

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2

  [[menu.main]]
    name = "Projects"
    url = "/projects/"
    weight = 3

  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 4

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

  [markup.goldmark.renderer]
    unsafe = true

  [markup.highlight]
    codeFences = true
    guessSyntax = true
    style = "monokai"

[caches]
  [caches.images]
    dir = ':cacheDir/images'
